name: Surge Deployment

on:
  push:
    branches:
      - main  # メインブランチに画像が追加されたら発動！

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Surge and Deploy
        run: |
          npm install -g surge
          surge . cdn.yamaki3970.f5.si --token ${{ secrets.SURGE_TOKEN }}
